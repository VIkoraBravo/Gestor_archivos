{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Nube - Nicolas</title>
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="logo">Vik</div>
            <ul class="menu">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
            <a href="#" class="cta">Empezar</a>
        </nav>
    </header>

    <div class="main-content">
        
        <section class="upload-section">
            <h1>☁️ Mi Nube Personal</h1>
            <form method="POST" enctype="multipart/form-data" action="{% url 'index' %}">
                {% csrf_token %}
                <div class="form-inputs">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn-upload">Subir Archivo</button>
            </form>

            <div style="margin-top: 25px; text-align: center;">
                <a href="https://console.cloudinary.com/console/media_library/folders/all" 
                   target="_blank" 
                   class="btn-cloudinary">
                   Gestionar Cloudinary
                </a>
            </div>
        </section>

        <section class="files-section">
            <h2>📂 Tus Archivos</h2>
            <div class="files-grid">
                {% for doc in archivos %}
                <div class="file-card">
                    <div class="file-info">
                        <span class="file-name">{{ doc.titulo }}</span>
                    </div>
                    <div class="btn-group">
                        <a href="{{ doc.archivo.url }}" target="_blank" class="link-action view">Ver</a>
                        <a href="{% url 'eliminar_archivo' doc.id %}" 
                           class="link-action delete" 
                           onclick="return confirm('¿Borrar este archivo?')">
                           Borrar
                        </a>
                    </div>
                </div>
                {% empty %}
                <p class="empty-msg">Tu nube está vacía actualmente.</p>
                {% endfor %}
            </div>
        </section>
    </div>
</body>
</html>
